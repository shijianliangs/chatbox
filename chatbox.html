<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 260px; min-width: 260px; background: #141414; border-right: 1px solid #222; display: flex; flex-direction: column; transition: margin-left 0.25s; z-index: 10; }
  .sidebar.collapsed { margin-left: -260px; }
  .sidebar-header { padding: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; }
  .new-chat-btn { flex: 1; background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 0; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .new-chat-btn:hover { background: #1d4ed8; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .chat-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; transition: background 0.15s; position: relative; }
  .chat-item:hover { background: #1e1e1e; }
  .chat-item.active { background: #1e1e1e; color: #fff; }
  .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .chat-item-date { font-size: 10px; color: #555; flex-shrink: 0; }
  .chat-item-del { display: none; background: none; border: none; color: #555; font-size: 14px; cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
  .chat-item-del:hover { color: #f87171; background: #2a1a1a; }
  .chat-item:hover .chat-item-del { display: block; }
  .chat-item:hover .chat-item-date { display: none; }
  .sidebar-footer { padding: 16px 12px; border-top: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 8px; }
  .export-btn { width: 100%; background: transparent; border: 1px solid #333; color: #888; border-radius: 6px; padding: 7px 0; font-size: 12px; cursor: pointer; }
  .export-btn:hover { border-color: #555; color: #bbb; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .header { padding: 10px 16px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .toggle-btn { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 4px 6px; border-radius: 6px; line-height: 1; }
  .toggle-btn:hover { background: #2a2a2a; color: #ccc; }
  .header h1 { font-size: 15px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .model-dropdown { position: relative; }
  .model-dropdown-btn { background: #2a2a2a; color: #e0e0e0; border: 1px solid #3a3a3a; border-radius: 6px; padding: 6px 24px 6px 10px; font-size: 13px; cursor: pointer; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; position: relative; }
  .model-dropdown-btn::after { content: '▾'; position: absolute; right: 7px; top: 50%; transform: translateY(-50%); color: #888; font-size: 10px; pointer-events: none; }
  .model-dropdown-btn:hover { border-color: #555; }
  .model-dropdown-btn:disabled { color: #555; cursor: default; }
  .model-dropdown-panel { display: none; position: absolute; top: calc(100% + 4px); right: 0; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; width: 220px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden; flex-direction: column; }
  .model-dropdown.open .model-dropdown-panel { display: flex; }
  .model-search-inp { background: #252525; color: #e0e0e0; border: none; border-bottom: 1px solid #2a2a2a; padding: 8px 10px; font-size: 13px; outline: none; width: 100%; flex-shrink: 0; }
  .model-search-inp::placeholder { color: #555; }
  .model-items-list { overflow-y: auto; max-height: 220px; }
  .model-items-list::-webkit-scrollbar { width: 4px; }
  .model-items-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .model-item { padding: 7px 12px; font-size: 13px; color: #bbb; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .model-item:hover { background: #2a2a2a; color: #fff; }
  .model-item.selected { color: #60a5fa; }
  .model-hint { padding: 10px 12px; font-size: 12px; color: #555; text-align: center; }
  .header-info { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
  .header-meta { font-size: 11px; color: #555; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .settings-btn { background: none; border: none; color: #666; font-size: 16px; cursor: pointer; padding: 4px 6px; border-radius: 6px; line-height: 1; }
  .settings-btn:hover { background: #2a2a2a; color: #ccc; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; width: 460px; max-width: 90vw; }
  .modal h2 { font-size: 16px; color: #fff; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; margin-top: 12px; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal textarea { width: 100%; background: #2a2a2a; color: #e0e0e0; border: 1px solid #3a3a3a; border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; }
  .modal input:focus, .modal textarea:focus { border-color: #646cff; }
  .modal textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .modal-actions button { padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
  .modal-actions .btn-cancel { background: #333; color: #aaa; }
  .modal-actions .btn-cancel:hover { background: #444; }
  .modal-actions .btn-save { background: #2563eb; color: #fff; }
  .modal-actions .btn-save:hover { background: #1d4ed8; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; max-width: 1280px; width: 100%; margin: 0 auto; }
  .messages::-webkit-scrollbar { width: 0; display: none; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .welcome { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 18px; }

  .msg-wrap { display: flex; flex-direction: column; max-width: 80%; position: relative; }
  .msg-wrap.user { align-self: flex-end; }
  .msg-wrap.assistant { align-self: flex-start; }
  .msg { max-width: 100%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { background: #1e1e1e; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
  .msg.assistant .cursor { display: inline-block; width: 2px; height: 14px; background: #646cff; animation: blink 0.8s infinite; vertical-align: text-bottom; margin-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .thinking-block { margin-bottom: 8px; }
  .thinking-block summary { cursor: pointer; font-size: 12px; color: #888; padding: 6px 10px; background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; user-select: none; list-style: none; display: flex; align-items: center; gap: 6px; }
  .thinking-block summary::-webkit-details-marker { display: none; }
  .thinking-block summary::before { content:''; display:inline-block; width:0; height:0; border-left:5px solid #888; border-top:4px solid transparent; border-bottom:4px solid transparent; transition:transform 0.2s; }
  .thinking-block[open] summary::before { transform: rotate(90deg); }
  .thinking-block .thinking-content { margin-top:6px; padding:10px 12px; background:#161616; border:1px solid #2a2a2a; border-radius:8px; font-size:13px; color:#999; line-height:1.6; white-space:pre-wrap; word-break:break-word; max-height:300px; overflow-y:auto; }
  .thinking-block .thinking-content::-webkit-scrollbar { width:4px; }
  .thinking-block .thinking-content::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
  .thinking-label-icon { display:inline-block; width:12px; height:12px; border:2px solid #646cff; border-top-color:transparent; border-radius:50%; }
  .thinking-label-icon.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .msg-stats { display:flex; gap:12px; font-size:11px; color:#555; padding:2px 4px; margin-top:4px; flex-wrap:wrap; }
  .msg-stats span { display:flex; align-items:center; gap:3px; }
  .copy-btn { align-self:flex-end; background:transparent; border:none; color:#555; font-size:12px; cursor:pointer; padding:2px 6px; margin-top:2px; border-radius:4px; transition:color 0.2s, background 0.2s; }
  .copy-btn:hover { color:#aaa; background:#2a2a2a; }
  .copy-btn.copied { color:#4ade80; }
  .msg-text { white-space: pre-wrap; word-break: break-word; }
  .attachment-list { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
  .attachment-card { display:flex; align-items:center; gap:10px; min-width:0; padding:10px 12px; border-radius:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .msg.user .attachment-card { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.18); }
  .attachment-thumb { width:52px; height:52px; border-radius:8px; object-fit:cover; flex-shrink:0; background:#111; border:1px solid rgba(255,255,255,0.08); }
  .attachment-icon { width:52px; height:52px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; background:#171717; border:1px solid rgba(255,255,255,0.08); }
  .msg.user .attachment-icon { background:rgba(0,0,0,0.15); }
  .attachment-meta { min-width:0; display:flex; flex-direction:column; gap:3px; }
  .attachment-name { font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .attachment-desc { font-size:11px; color:#8f8f8f; }
  .msg.user .attachment-desc { color:rgba(255,255,255,0.76); }
  .attachment-preview { margin-top:6px; padding:8px 10px; border-radius:10px; background:rgba(0,0,0,0.2); font-size:11px; color:inherit; white-space:pre-wrap; word-break:break-word; max-height:120px; overflow:auto; }

  /* Input */
  .input-area { padding: 18px 20px 22px; background: linear-gradient(180deg, #181818, #151515); border-top: 1px solid #252525; flex-shrink: 0; position: relative; }
  .input-area::before { content:''; position:absolute; left:20px; right:20px; top:0; height:1px; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent); }
  .input-inner { display:flex; max-width:1280px; margin:0 auto; align-items:center; }
  .input-stack { flex:1; display:flex; flex-direction:column; gap:12px; min-width:0; padding:14px 16px 12px; border-radius:22px; border:1px solid #303030; background:
    radial-gradient(circle at top left, rgba(96,165,250,0.12), transparent 32%),
    linear-gradient(180deg, #232323, #1a1a1a 58%, #171717);
    box-shadow: 0 16px 40px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .input-tools { display:flex; align-items:center; gap:12px; }
  .attach-btn { width:38px; height:38px; border-radius:12px; border:1px solid #3d3d3d; background:rgba(255,255,255,0.04); color:#b5b5b5; font-size:20px; line-height:1; padding:0; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:border-color 0.2s, transform 0.2s, color 0.2s, background 0.2s; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
  .attach-btn:hover { border-color:#5c5c5c; color:#fff; background:rgba(255,255,255,0.07); transform:translateY(-1px); }
  .attach-btn:active { transform:translateY(0); }
  .input-area textarea { flex:1; background:transparent; color:#ededed; border:none; border-radius:16px; padding:8px 4px 7px; font-size:15px; font-family:inherit; resize:none; outline:none; min-height:34px; max-height:120px; line-height:1.6; }
  .input-area textarea::placeholder { color:#757575; }
  .input-area button { background:#2563eb; color:#fff; border:none; border-radius:999px; padding:0 18px; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.2s, transform 0.2s, box-shadow 0.2s; flex-shrink:0; }
  .input-area button:hover { background:#1d4ed8; transform:translateY(-1px); box-shadow:0 10px 22px rgba(37,99,235,0.28); }
  .input-area button:disabled { background:#333; color:#666; cursor:not-allowed; box-shadow:none; transform:none; }
  #sendBtn { height:38px; }
  .attachment-tray { display:none; flex-wrap:wrap; gap:8px; }
  .attachment-tray.has-items { display:flex; }
  .pending-attachment { display:flex; align-items:center; gap:9px; max-width:280px; padding:8px 10px; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .pending-attachment-thumb { width:38px; height:38px; border-radius:10px; object-fit:cover; flex-shrink:0; background:#111; }
  .pending-attachment-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:#171717; font-size:15px; flex-shrink:0; }
  .pending-attachment-meta { min-width:0; display:flex; flex-direction:column; gap:2px; }
  .pending-attachment-name { font-size:12px; color:#ddd; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pending-attachment-desc { font-size:11px; color:#7d7d7d; }
  .pending-attachment-remove { width:22px; height:22px; border-radius:50%; border:none; background:#2a2a2a; color:#888; cursor:pointer; padding:0; flex-shrink:0; }
  .pending-attachment-remove:hover { background:#3a2020; color:#fca5a5; }
  .input-hint { font-size:11px; color:#727272; padding-left:2px; letter-spacing:0.01em; }

  /* Markdown */
  .msg.assistant { white-space: normal; }
  .msg.assistant p { margin: 6px 0; }
  .msg.assistant p:first-child { margin-top: 0; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant pre { background: #111; border: 1px solid #333; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
  .msg.assistant code { font-family: 'SF Mono', 'Fira Code', Consolas, monospace; font-size: 13px; }
  .msg.assistant :not(pre) > code { background: #2a2a2a; padding: 2px 6px; border-radius: 4px; }
  .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 6px 0; }
  .msg.assistant li { margin: 2px 0; }
  .msg.assistant blockquote { border-left: 3px solid #444; padding-left: 12px; color: #999; margin: 6px 0; }
  .msg.assistant table { border-collapse: collapse; margin: 8px 0; }
  .msg.assistant th, .msg.assistant td { border: 1px solid #333; padding: 6px 10px; text-align: left; }
  .msg.assistant th { background: #1a1a1a; }
  .msg.assistant h1, .msg.assistant h2, .msg.assistant h3, .msg.assistant h4 { margin: 10px 0 6px; }
  .msg.assistant h1 { font-size: 1.3em; } .msg.assistant h2 { font-size: 1.15em; } .msg.assistant h3 { font-size: 1.05em; }
  .msg.assistant a { color: #60a5fa; text-decoration: none; }
  .msg.assistant a:hover { text-decoration: underline; }
  .msg.assistant hr { border: none; border-top: 1px solid #333; margin: 10px 0; }
  .msg.assistant img { max-width: 100%; border-radius: 6px; }
  .code-block-wrap { position: relative; }
  .code-copy-btn { position: absolute; top: 6px; right: 6px; background: #333; border: none; color: #888; font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
  .code-block-wrap:hover .code-copy-btn { opacity: 1; }
  .code-copy-btn:hover { color: #ccc; background: #444; }
  .code-copy-btn.copied { color: #4ade80; }

  @media (max-width: 700px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; box-shadow: 2px 0 12px rgba(0,0,0,0.5); }
    .sidebar.collapsed { margin-left: -260px; }
    .input-area { padding:14px 12px 16px; }
    .input-area::before { left:12px; right:12px; }
    .input-stack { padding:12px 12px 10px; border-radius:18px; }
  }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
  </div>
  <div class="sidebar-list" id="sidebarList"></div>
  <div class="sidebar-footer">
    <button class="export-btn" onclick="openSSEModal()">解析流式文件</button>
    <input type="file" id="sseFileInput" accept=".txt,.log,.jsonl,.sse,.json" style="display:none" onchange="handleSSEFile(this)">
    <button class="export-btn" onclick="exportAll()">导出全部记录</button>
  </div>
</div>

<div class="main">
  <div class="header">
    <button class="toggle-btn" onclick="toggleSidebar()" title="切换侧栏">☰</button>
    <h1 id="headerTitle">ChatBox</h1>
    <div class="header-info">
      <div class="model-dropdown" id="modelDropdown">
        <button class="model-dropdown-btn" id="modelTrigger" type="button">选择模型</button>
        <div class="model-dropdown-panel" onclick="event.stopPropagation()">
          <input class="model-search-inp" id="modelSearch" placeholder="搜索模型..." autocomplete="off">
          <div class="model-items-list" id="modelList"></div>
        </div>
      </div>
      <span class="header-meta" id="headerMeta"></span>
      <button class="settings-btn" onclick="openSettings()" title="设置">⚙</button>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome">选择历史对话或开始新对话</div>
  </div>
  <div class="input-area">
    <div class="input-inner">
      <input type="file" id="fileInput" multiple style="display:none">
      <div class="input-stack">
        <div class="attachment-tray" id="attachmentTray"></div>
        <div class="input-tools">
          <button class="attach-btn" type="button" id="attachBtn" title="上传图片或文件">+</button>
          <textarea id="input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
          <button id="sendBtn" onclick="send()">发送</button>
        </div>
        <div class="input-hint" id="inputHint">支持图片和文本文件；其他文件会附带元信息发送。</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2>设置</h2>
    <label>Endpoint</label>
    <input type="text" id="cfgEndpoint" placeholder="https://api.example.com/v1/chat/completions">
    <label>API Key</label>
    <input type="password" id="cfgKey" placeholder="sk-...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">取消</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="sseModal" onclick="if(event.target===this)closeSSEModal()">
  <div class="modal">
    <h2>解析流式数据</h2>
    <label>粘贴 SSE 流式数据，或从文件导入</label>
    <textarea id="sseInput" placeholder="data: {&quot;choices&quot;:[{&quot;delta&quot;:{&quot;content&quot;:&quot;...&quot;}}]}&#10;data: {&quot;choices&quot;:[{&quot;delta&quot;:{&quot;content&quot;:&quot;...&quot;}}]}&#10;data: [DONE]" style="min-height:200px;"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('sseFileInput').click()" style="margin-right:auto;">选择文件</button>
      <button class="btn-cancel" onclick="closeSSEModal()">取消</button>
      <button class="btn-save" onclick="submitSSE()">解析</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'chat_logs';
const CONFIG_KEY = 'chatbox_config';
const LAST_MODEL_KEY = 'chatbox_last_model';
const SYSTEM_PROMPT = '使用中文回答，除非特殊说明的';
const MAX_ATTACHMENTS = 6;
const MAX_IMAGE_BYTES = 2 * 1024 * 1024;
const MAX_TEXT_BYTES = 300 * 1024;
const TEXT_ATTACHMENT_PREVIEW = 800;
const TEXT_FILE_TYPES = ['text/', 'application/json', 'application/xml', 'application/javascript'];
const TEXT_FILE_EXTS = ['txt', 'md', 'markdown', 'json', 'jsonl', 'csv', 'tsv', 'js', 'ts', 'jsx', 'tsx', 'html', 'css', 'xml', 'yml', 'yaml', 'py', 'rb', 'go', 'rs', 'java', 'c', 'cc', 'cpp', 'h', 'hpp', 'sh', 'sql'];
let storageWarned = false;

const DB_NAME = 'chatbox_db';
const DB_VERSION = 1;
const STORE_CHATS = 'chats';

let dbPromise = null;
function openDB() {
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) { reject(new Error('浏览器不支持 IndexedDB')); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_CHATS)) {
        db.createObjectStore(STORE_CHATS, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbPromise;
}

function idbGetAllChats() {
  return openDB().then(db => new Promise((resolve, reject) => {
    const req = db.transaction(STORE_CHATS, 'readonly').objectStore(STORE_CHATS).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  }));
}

function idbPutChat(chat) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_CHATS, 'readwrite');
    tx.objectStore(STORE_CHATS).put(chat);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.onabort = () => reject(tx.error);
  }));
}

function idbDeleteChat(id) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_CHATS, 'readwrite');
    tx.objectStore(STORE_CHATS).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.onabort = () => reject(tx.error);
  }));
}

function idbBulkPut(chats) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_CHATS, 'readwrite');
    const store = tx.objectStore(STORE_CHATS);
    chats.forEach(c => store.put(c));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.onabort = () => reject(tx.error);
  }));
}

function persistChat(chat) {
  idbPutChat(chat).catch(e => {
    console.warn('保存聊天失败:', e);
    if (!storageWarned) {
      storageWarned = true;
      alert('保存聊天记录失败：' + (e.message || e));
    }
  });
}

function removeChatFromDB(id) {
  idbDeleteChat(id).catch(e => console.warn('删除聊天失败:', e));
}

async function migrateLocalStorageChats() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const list = JSON.parse(raw);
    if (Array.isArray(list) && list.length > 0) {
      await idbBulkPut(list);
    }
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {
    console.warn('迁移 localStorage 失败:', e);
  }
}

function getConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)); }
  catch { return null; }
}

function hasConfig() {
  return !!getConfig();
}

function maskKey(key) {
  if (!key || key.length <= 8) return '****';
  return key.slice(0, 4) + '****' + key.slice(-4);
}

function getModelsUrl(endpoint) {
  try {
    const url = new URL(endpoint);
    const idx = url.pathname.indexOf('/v1');
    url.pathname = (idx !== -1 ? url.pathname.slice(0, idx) : '') + '/v1/models';
    url.search = '';
    return url.toString();
  } catch { return null; }
}

async function fetchModels(endpoint, key) {
  const url = getModelsUrl(endpoint);
  if (!url) return [];
  try {
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + key } });
    if (!res.ok) return [];
    const data = await res.json();
    return (data.data || []).map(m => ({ value: m.id, label: m.id })).sort((a, b) => a.value.localeCompare(b.value));
  } catch { return []; }
}

function loadStoredArray(key) {
  try {
    const value = JSON.parse(localStorage.getItem(key) || '[]');
    return Array.isArray(value) ? value : [];
  } catch {
    return [];
  }
}

function getSSEDataValue(line) {
  const trimmed = line.trim();
  if (!trimmed.startsWith('data:')) return null;
  return trimmed.slice(5).trimStart();
}

function formatBytes(bytes) {
  if (!Number.isFinite(bytes) || bytes < 1024) return (bytes || 0) + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1).replace(/\.0$/, '') + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1).replace(/\.0$/, '') + ' MB';
}

function fileExt(name) {
  const parts = (name || '').toLowerCase().split('.');
  return parts.length > 1 ? parts.pop() : '';
}

function isImageFile(file) {
  return !!file?.type && file.type.startsWith('image/');
}

function isTextFile(file) {
  if (!file) return false;
  if (TEXT_FILE_TYPES.some(type => file.type.startsWith(type))) return true;
  return TEXT_FILE_EXTS.includes(fileExt(file.name));
}

function attachmentIcon(kind, type) {
  if (kind === 'image') return '🖼';
  if (kind === 'text') return '📝';
  if ((type || '').includes('pdf')) return '📄';
  if ((type || '').includes('zip')) return '🗜';
  return '📎';
}

function attachmentDescription(att) {
  const desc = [formatBytes(att.size || 0)];
  if (att.kind === 'image') desc.push('图片');
  else if (att.kind === 'text') desc.push('文本已附带');
  else desc.push(att.type || '二进制文件');
  return desc.join(' · ');
}

function textPreview(text) {
  const normalized = (text || '').trim();
  if (!normalized) return '';
  return normalized.length > TEXT_ATTACHMENT_PREVIEW ? normalized.slice(0, TEXT_ATTACHMENT_PREVIEW) + '\n...' : normalized;
}

function normalizeAttachments(list) {
  return Array.isArray(list) ? list : [];
}

function messageText(message) {
  return typeof message?.content === 'string' ? message.content : '';
}

function messageAttachments(message) {
  return normalizeAttachments(message?.attachments);
}

function buildCopyText(message) {
  const lines = [];
  const text = messageText(message);
  if (text) lines.push(text);
  messageAttachments(message).forEach(att => {
    lines.push(`[附件] ${att.name} (${attachmentDescription(att)})`);
    if (att.kind === 'text' && att.textContent) lines.push(att.textContent);
  });
  return lines.filter(Boolean).join('\n\n');
}

function renderAttachments(container, attachments) {
  if (!attachments.length) return;
  const list = document.createElement('div');
  list.className = 'attachment-list';
  attachments.forEach(att => {
    const card = document.createElement('div');
    card.className = 'attachment-card';
    if (att.kind === 'image' && att.dataUrl) {
      const img = document.createElement('img');
      img.className = 'attachment-thumb';
      img.src = att.dataUrl;
      img.alt = att.name;
      card.appendChild(img);
    } else {
      const icon = document.createElement('div');
      icon.className = 'attachment-icon';
      icon.textContent = attachmentIcon(att.kind, att.type);
      card.appendChild(icon);
    }

    const meta = document.createElement('div');
    meta.className = 'attachment-meta';
    const name = document.createElement('div');
    name.className = 'attachment-name';
    name.textContent = att.name;
    const desc = document.createElement('div');
    desc.className = 'attachment-desc';
    desc.textContent = attachmentDescription(att);
    meta.append(name, desc);

    if (att.kind === 'text' && att.textPreview) {
      const preview = document.createElement('div');
      preview.className = 'attachment-preview';
      preview.textContent = att.textPreview;
      meta.appendChild(preview);
    }

    card.appendChild(meta);
    list.appendChild(card);
  });
  container.appendChild(list);
}

function serializeAttachment(file, extra) {
  return {
    id: 'att_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    name: file.name,
    size: file.size,
    type: file.type || 'application/octet-stream',
    ...extra
  };
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error('读取文件失败'));
    reader.readAsDataURL(file);
  });
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error('读取文件失败'));
    reader.readAsText(file);
  });
}

let selectedModelValue = localStorage.getItem(LAST_MODEL_KEY) || '';

function setModelTrigger(text, disabled) {
  const btn = document.getElementById('modelTrigger');
  btn.textContent = text;
  btn.disabled = !!disabled;
}

function populateModelSelect(models, savedValue) {
  const list = document.getElementById('modelList');
  list.innerHTML = '';
  if (models.length === 0) {
    list.innerHTML = '<div class="model-hint">无可用模型</div>';
    return;
  }
  const target = savedValue || selectedModelValue;
  const match = models.find(m => m.value === target);
  selectedModelValue = match ? match.value : models[0].value;
  localStorage.setItem(LAST_MODEL_KEY, selectedModelValue);
  setModelTrigger(selectedModelValue, false);
  models.forEach(m => {
    const el = document.createElement('div');
    el.className = 'model-item' + (m.value === selectedModelValue ? ' selected' : '');
    el.textContent = m.label;
    el.dataset.value = m.value;
    el.onclick = () => {
      selectedModelValue = m.value;
      localStorage.setItem(LAST_MODEL_KEY, m.value);
      setModelTrigger(m.label, false);
      document.getElementById('modelDropdown').classList.remove('open');
      list.querySelectorAll('.model-item').forEach(i => i.classList.toggle('selected', i.dataset.value === m.value));
    };
    list.appendChild(el);
  });
}

function filterModels(q) {
  const lq = q.toLowerCase();
  const list = document.getElementById('modelList');
  let visible = 0;
  list.querySelectorAll('.model-item').forEach(el => {
    const show = el.dataset.value.toLowerCase().includes(lq);
    el.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  let hint = list.querySelector('.model-hint');
  if (visible === 0 && q) {
    if (!hint) { hint = document.createElement('div'); hint.className = 'model-hint'; list.appendChild(hint); }
    hint.textContent = '无匹配';
    hint.style.display = '';
  } else if (hint) {
    hint.style.display = 'none';
  }
}

async function refreshConfigUI() {
  const cfg = getConfig();
  const meta = document.getElementById('headerMeta');
  if (!cfg) {
    setModelTrigger('选择模型', true);
    meta.textContent = '未配置';
    meta.style.color = '#f87171';
    return;
  }
  meta.style.color = '';
  let host = cfg.endpoint;
  try { host = new URL(cfg.endpoint).host; } catch {}
  meta.textContent = host + ' · ' + maskKey(cfg.key);

  const saved = localStorage.getItem(LAST_MODEL_KEY) || '';
  const cacheKey = 'chatbox_models_' + cfg.endpoint;
  const cached = loadStoredArray(cacheKey);

  if (cached.length > 0) {
    populateModelSelect(cached, saved);
  } else {
    setModelTrigger('加载中...', true);
  }

  const models = await fetchModels(cfg.endpoint, cfg.key);
  if (models.length > 0) {
    try { localStorage.setItem(cacheKey, JSON.stringify(models)); } catch {}
    populateModelSelect(models, selectedModelValue || saved);
  } else if (cached.length === 0) {
    setModelTrigger('获取失败', false);
  }
}

function openSettings() {
  const cfg = getConfig() || {};
  document.getElementById('cfgEndpoint').value = cfg.endpoint || '';
  document.getElementById('cfgKey').value = cfg.key || '';
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function saveSettings() {
  const endpoint = document.getElementById('cfgEndpoint').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  if (!endpoint || !key) return;
  if (!endpoint.startsWith('https://') && !endpoint.startsWith('http://localhost') && !endpoint.startsWith('http://127.0.0.1')) {
    if (!confirm('Endpoint 未使用 HTTPS，API Key 可能被明文传输，是否继续？')) return;
  }
  try { localStorage.removeItem('chatbox_models_' + endpoint); } catch {}
  localStorage.setItem(CONFIG_KEY, JSON.stringify({ endpoint, key }));
  refreshConfigUI();
  closeSettings();
}

function saveCurrentChat() {

    id: 'chat_' + Date.now(),

    createdAt: Date.now(),
    updatedAt: Date.now(),

function loadChat(id) {

  currentChatId = id;

function renderSidebar() {

      item.append(title, date, del);

function groupByDate(list) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const yesterday = today - 86400000;
  const week = today - 7 * 86400000;
  const groups = [['今天', []], ['昨天', []], ['近7天', []], ['更早', []]];
  for (const c of list) {
    const t = c.updatedAt || c.createdAt;
    if (t >= today) groups[0][1].push(c);
    else if (t >= yesterday) groups[1][1].push(c);
    else if (t >= week) groups[2][1].push(c);
    else groups[3][1].push(c);
  }
  return groups;
}

function fmt(n) { return Number(n).toLocaleString(); }
function escHtml(s) { const d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

function formatTime(ts) {
  const d = new Date(ts);
  return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function renderMessages() {

function addMsgDOM(role, content) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const attachments = arguments[2] || [];

      div.appendChild(text);

    navigator.clipboard.writeText(div.dataset.raw || div.textContent).then(() => {

      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '复制'; copyBtn.classList.remove('copied'); }, 1500);
    });

function renderPendingAttachments() {

      item.appendChild(img);

    name.className = 'pending-attachment-name';

async function handleFileSelect(input) {
  const files = Array.from(input.files || []);
  input.value = '';
  await addFiles(files);
}

async function addFiles(files) {
  if (!files.length) return;
  if (pendingAttachments.length + files.length > MAX_ATTACHMENTS) {
    alert(`最多上传 ${MAX_ATTACHMENTS} 个附件`);
    return;
  }

  const next = [];
  for (const file of files) {
    try {
      if (isImageFile(file)) {
        if (file.size > MAX_IMAGE_BYTES) {
          alert(`图片 ${file.name} 超过 ${formatBytes(MAX_IMAGE_BYTES)} 限制`);
          continue;
        }
        const dataUrl = await readFileAsDataURL(file);
        next.push(serializeAttachment(file, { kind: 'image', dataUrl }));
        continue;
      }

      if (isTextFile(file)) {
        if (file.size > MAX_TEXT_BYTES) {
          alert(`文本文件 ${file.name} 超过 ${formatBytes(MAX_TEXT_BYTES)} 限制`);
          continue;
        }
        const textContent = String(await readFileAsText(file));
        next.push(serializeAttachment(file, {
          kind: 'text',
          textContent,
          textPreview: textPreview(textContent)
        }));
        continue;
      }

      next.push(serializeAttachment(file, { kind: 'binary' }));
    } catch (e) {
      alert(`读取 ${file.name} 失败: ${e.message || e}`);
    }
  }

  pendingAttachments = pendingAttachments.concat(next);
  renderPendingAttachments();
}

async function handlePaste(e) {
  const items = Array.from(e.clipboardData?.items || []);
  if (!items.length) return;
  const imageFiles = items
    .filter(item => item.kind === 'file' && item.type.startsWith('image/'))
    .map(item => item.getAsFile())
    .filter(Boolean);
  if (!imageFiles.length) return;
  e.preventDefault();
  await addFiles(imageFiles);
}

function composeUserText(text, attachments) {
  const parts = [];
  if (text) parts.push(text);
  attachments.forEach(att => {
    if (att.kind === 'text' && att.textContent) {
      parts.push(`附件文件：${att.name}\n\`\`\`\n${att.textContent}\n\`\`\``);
    } else if (att.kind === 'binary') {
      parts.push(`附件文件：${att.name}（${attachmentDescription(att)}）。该文件为二进制，未直接内联正文。`);
    }
  });
  if (parts.length === 0 && attachments.some(att => att.kind === 'image')) {
    parts.push('请结合附件图片回答。');
  }
  return parts.join('\n\n');
}

function buildApiMessage(message) {
  const text = messageText(message);
  const attachments = messageAttachments(message);
  if (message.role !== 'user' || attachments.length === 0) {
    return { role: message.role, content: text };
  }

  const composedText = composeUserText(text, attachments);
  const parts = [];
  if (composedText) parts.push({ type: 'text', text: composedText });
  attachments.forEach(att => {
    if (att.kind === 'image' && att.dataUrl) {
      parts.push({ type: 'image_url', image_url: { url: att.dataUrl, detail: 'auto' } });
    }
  });
  return { role: message.role, content: parts.length === 1 && parts[0].type === 'text' ? composedText : parts };
}

function isSSEData(text) {
  const lines = text.trim().split('\n');
  for (const line of lines) {
    const t = line.trim();
    if (!t || t.startsWith(':')) continue;
    if (/^(event|id|retry):/.test(t)) continue;
    const data = getSSEDataValue(t);
    if (data == null) return false;
    if (!data || data === '[DONE]') continue;
    try {
      const json = JSON.parse(data);
      if (json.choices || json.usage) return true;
    } catch {}
  }
  return false;
}

function parseSSEData(text) {
  const lines = text.trim().split('\n');
  let content = '', thinking = '', model = '';
  let usage = null;
  let id = '';
  for (const line of lines) {
    const data = getSSEDataValue(line);
    if (data == null || !data || data === '[DONE]') continue;
    try {
      const json = JSON.parse(data);
      if (json.model) model = json.model;
      if (json.id) id = json.id;
      if (json.usage) usage = json.usage;
      const delta = json.choices?.[0]?.delta;
      if (delta?.content) content += delta.content;
      if (delta?.reasoning_content) thinking += delta.reasoning_content;
    } catch {}
  }
  const chunks = lines.filter(line => {
    const data = getSSEDataValue(line);
    return data != null && data !== '' && data !== '[DONE]';
  }).length;
  return { content, thinking, model, usage, id, chunks };
}

function handleSSEFile(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('sseInput').value = e.target.result;
    document.getElementById('sseModal')._fileName = file.name;
  };
  reader.readAsText(file);
}

function openSSEModal() {
  document.getElementById('sseInput').value = '';
  document.getElementById('sseModal')._fileName = null;
  document.getElementById('sseModal').classList.add('open');
}

function closeSSEModal() {
  document.getElementById('sseModal').classList.remove('open');
}

function submitSSE() {
  const text = document.getElementById('sseInput').value.trim();
  if (!text) return;
  if (!isSSEData(text)) {
    alert('内容不是有效的 SSE 流式数据');
    return;
  }
  const fileName = document.getElementById('sseModal')._fileName;
  closeSSEModal();
  renderSSEResult(text, fileName);
}

function renderSSEResult(text, fileName) {
  if (controller) return;

  const { content, thinking, model, usage, id, chunks } = parseSSEData(text);
  if (!content && !thinking) {
    alert('未能从流式数据中解析出内容');
    return;
  }

  newChat();

  const welcome = messagesEl.querySelector('.welcome');
  if (welcome) welcome.remove();

  const label = fileName || '流式数据';
  const summary = label + ' (' + chunks + ' chunks' + (model ? ', ' + model : '') + ')';
  addMsgDOM('user', summary);
  messages.push({ role: 'user', content: summary });

  const chat = chatList.find(c => c.id === currentChatId);
  if (chat) {
    chat.title = label.replace(/\.[^.]+$/, '').slice(0, 20) + ' - ' + (model || '未知');
    document.getElementById('headerTitle').textContent = chat.title;
    persistChat(chat);
    renderSidebar();
  }

  const assistantDiv = addMsgDOM('assistant', content);
  const wrap = assistantDiv.parentElement;

  if (thinking) {
    const block = document.createElement('details');
    block.className = 'thinking-block';
    const s = document.createElement('summary');
    const icon = document.createElement('span');
    icon.className = 'thinking-label-icon';
    s.appendChild(icon);
    s.append(' 思考完成');
    block.appendChild(s);
    const tc = document.createElement('div');
    tc.className = 'thinking-content';
    tc.textContent = thinking;
    block.appendChild(tc);
    wrap.insertBefore(block, assistantDiv);
  }

  const statsDiv = document.createElement('div');
  statsDiv.className = 'msg-stats';
  let sh = '';
  if (model) sh += `<span>${escHtml(model)}</span>`;
  if (id) sh += `<span>${escHtml(id)}</span>`;
  sh += `<span>${chunks} chunks</span>`;
  if (usage) {
    sh += `<span>input ${fmt(usage.prompt_tokens || 0)}</span>`;
    sh += `<span>output ${fmt(usage.completion_tokens || 0)}</span>`;
    sh += `<span>total ${fmt(usage.total_tokens || 0)} tokens</span>`;
  }
  statsDiv.innerHTML = sh;
  const copyBtn = wrap.querySelector('.copy-btn');
  wrap.insertBefore(statsDiv, copyBtn);

  highlightCode(assistantDiv);

  const msgObj = { role: 'assistant', content };
  if (thinking) msgObj.thinking = thinking;
  msgObj.stats = { elapsed: '0', prompt: usage?.prompt_tokens || 0, completion: usage?.completion_tokens || 0, total: usage?.total_tokens || 0, model: model || '' };
  messages.push(msgObj);

  saveCurrentChat();
  messagesEl.scrollTop = messagesEl.scrollHeight;
  inputEl.focus();
}

async function send() {
  const text = inputEl.value.trim();
  const attachments = pendingAttachments.map(att => ({ ...att }));
  if ((!text && attachments.length === 0) || controller) return;

  const cfg = getConfig();
  if (!cfg) {
    openSettings();
    return;
  }

  const model = selectedModelValue;
  if (!model) {
    alert('没有可用模型，请检查设置或重新加载模型列表');
    return;
  }

  if (!currentChatId) newChat();

  const welcome = messagesEl.querySelector('.welcome');
  if (welcome) welcome.remove();

  inputEl.value = '';
  inputEl.style.height = 'auto';
  clearPendingAttachments();
  addMsgDOM('user', text, attachments);
  messages.push({ role: 'user', content: text, attachments });

  // update title from first user message
  const chat = chatList.find(c => c.id === currentChatId);
  if (chat && chat.title === '新对话') {
    chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
    document.getElementById('headerTitle').textContent = chat.title;
    persistChat(chat);
    renderSidebar();
  }

  saveCurrentChat();

  const assistantDiv = addMsgDOM('assistant', '');
  const wrap = assistantDiv.parentElement;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  assistantDiv.appendChild(cursor);

  let thinkingBlock = null;
  let thinkingContent = null;
  let thinkingIcon = null;

  sendBtn.disabled = true;
  sendBtn.textContent = '停止';
  sendBtn.disabled = false;
  sendBtn.onclick = stopGeneration;

  controller = new AbortController();
  let fullText = '';
  let thinkingText = '';
  let totalTokens = { prompt: 0, completion: 0, total: 0 };
  let usedModel = model;
  const startTime = Date.now();
  let sawDone = false;

  function handleStreamLine(line) {
    const data = getSSEDataValue(line);
    if (data == null || !data) return;
    if (data === '[DONE]') {
      sawDone = true;
      return;
    }

    try {
      const json = JSON.parse(data);
      const delta = json.choices?.[0]?.delta;
      const reasoning = delta?.reasoning_content;
      const content = delta?.content;

      if (json.model) usedModel = json.model;
      if (json.usage) {
        totalTokens.prompt = json.usage.prompt_tokens || 0;
        totalTokens.completion = json.usage.completion_tokens || 0;
        totalTokens.total = json.usage.total_tokens || 0;
      }

      if (reasoning) {
        if (!thinkingBlock) {
          thinkingBlock = document.createElement('details');
          thinkingBlock.className = 'thinking-block';
          thinkingBlock.open = true;
          const summary = document.createElement('summary');
          thinkingIcon = document.createElement('span');
          thinkingIcon.className = 'thinking-label-icon spinning';
          summary.appendChild(thinkingIcon);
          summary.append(' 思考中...');
          thinkingBlock.appendChild(summary);
          thinkingContent = document.createElement('div');
          thinkingContent.className = 'thinking-content';
          thinkingBlock.appendChild(thinkingContent);
          wrap.insertBefore(thinkingBlock, assistantDiv);
        }
        thinkingText += reasoning;
        thinkingContent.textContent = thinkingText;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      if (content) {
        if (thinkingBlock && thinkingIcon) {
          thinkingIcon.classList.remove('spinning');
          thinkingBlock.querySelector('summary').lastChild.textContent = ' 思考完成';
          thinkingBlock.open = false;
        }
        fullText += content;
        assistantDiv.innerHTML = renderMd(fullText);
        assistantDiv.dataset.raw = fullText;
        assistantDiv.appendChild(cursor);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    } catch {}
  }

  try {
    const res = await fetch(cfg.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.key },
      body: JSON.stringify({ model, messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages.map(buildApiMessage)], stream: true, stream_options: { include_usage: true },  enable_thinking: true}),
      signal: controller.signal
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();

      buffer += done ? decoder.decode() : decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        handleStreamLine(line);
        if (sawDone) break;
      }
      if (done) {
        if (buffer.trim()) handleStreamLine(buffer);
        break;
      }
      if (sawDone) break;
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      fullText += (fullText ? '\n\n' : '') + '⚠ 错误: ' + e.message;
      assistantDiv.innerHTML = renderMd(fullText);
      assistantDiv.dataset.raw = fullText;
    }
  }

  cursor.remove();
  if (!fullText && thinkingText) {
    assistantDiv.textContent = '（仅收到思考内容，无最终回复）';
    assistantDiv.dataset.raw = thinkingText;
  }

  if (thinkingBlock && thinkingIcon) {
    thinkingIcon.classList.remove('spinning');
    thinkingBlock.querySelector('summary').lastChild.textContent = ' 思考完成';
    if (fullText) thinkingBlock.open = false;
  }

  if (fullText || thinkingText) {
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    const statsDiv = document.createElement('div');
    statsDiv.className = 'msg-stats';
    statsDiv.innerHTML = `<span>${elapsed}s</span><span>input ${fmt(totalTokens.prompt)}</span><span>output ${fmt(totalTokens.completion)}</span><span>total ${fmt(totalTokens.total)} tokens</span><span>${escHtml(usedModel)}</span>`;
    const copyBtn = wrap.querySelector('.copy-btn');
    wrap.insertBefore(statsDiv, copyBtn);

    highlightCode(assistantDiv);

    const msgObj = { role: 'assistant', content: fullText || '（仅收到思考内容，无最终回复）' };
    if (thinkingText) msgObj.thinking = thinkingText;
    msgObj.stats = { elapsed, prompt: totalTokens.prompt, completion: totalTokens.completion, total: totalTokens.total, model: usedModel };
    messages.push(msgObj);
  } else {
    wrap.remove();
  }

  saveCurrentChat();

  controller = null;
  sendBtn.textContent = '发送';
  sendBtn.onclick = send;
  sendBtn.disabled = false;
  inputEl.focus();
}

function stopGeneration() {
  if (controller) controller.abort();
}

function exportAll() {
  if (!confirm('将导出全部聊天记录，确认继续？')) return;
  const blob = new Blob([JSON.stringify(chatList, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chat_logs_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

document.getElementById('modelTrigger').addEventListener('click', e => {
  e.stopPropagation();
  const dd = document.getElementById('modelDropdown');
  const opening = !dd.classList.contains('open');
  dd.classList.toggle('open');
  if (opening) {
    const inp = document.getElementById('modelSearch');
    inp.value = '';
    filterModels('');
    inp.focus();
  }
});
document.getElementById('modelSearch').addEventListener('input', e => filterModels(e.target.value));
document.addEventListener('click', () => document.getElementById('modelDropdown').classList.remove('open'));
attachBtnEl.addEventListener('click', () => fileInputEl.click());
fileInputEl.addEventListener('change', () => handleFileSelect(fileInputEl));

refreshConfigUI();
(async () => {
  try {
    await migrateLocalStorageChats();
    const all = await idbGetAllChats();
    chatList = all.sort((a, b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));
  } catch (e) {
    console.warn('加载聊天记录失败:', e);
    alert('加载聊天记录失败：' + (e.message || e));
  }
  renderSidebar();
  const savedChatId = sessionStorage.getItem('current_chat_id');
  if (savedChatId && chatList.find(c => c.id === savedChatId)) {
    loadChat(savedChatId);
  } else {
    inputEl.focus();
  }
})();
